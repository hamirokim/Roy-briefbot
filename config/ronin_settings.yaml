# ============================================================
# ronin_settings.yaml — 브리프봇 v2.0 튜닝 파라미터
# ============================================================
# 이 파일이 모든 임계치/cooldown/limit의 단일 진실 소스.
# 코드 안에 매직넘버 박지 말 것. 전부 여기서 읽음.

# ── SCOUT 사전 감지 신호 임계치 ──
scout:
  # 글로벌 거시 필터 (Stage 1)
  market_cap_min_usd: 1_000_000_000   # $1B
  avg_volume_value_min_usd: 1_000_000 # 일평균 거래대금 $1M

  # SCOUT v3 공통 문지기 — 모든 레인 공통 하드 필터
  # v0.1: 가격/거래대금/데이터 신선도만 hard reject.
  # 급락/악재/재무위험은 needs_review로 시작하고, 데이터 소스 보강 후 승격한다.
  common_gate:
    enabled: true
    allowed_countries: ["US", "KR"]
    min_market_cap_usd:
      US: 1_000_000_000       # $1B
      KR: 200_000_000         # 약 3000억원대. universe cap 완화 전까지는 상위 종목만 통과
    min_price:
      US: 5.0                 # $5
      KR: 2000.0              # ₩2,000
    min_avg_traded_value_20d:
      US: 10_000_000          # 20일 평균 거래대금 $10M
      KR: 2_000_000_000       # 20일 평균 거래대금 ₩20억
    min_close_days: 120
    max_stale_trading_days: 3
    max_zero_volume_days_20d: 2
    drop_5d_needs_review_pct: -0.25

  # SCOUT v3 3레인 가격 구조 — OHLCV 기반 1차 구현
  price_lanes:
    enabled: true
    strength:
      rs_63d_min_pctp: 0.05
      rs_126d_min_pctp: 0.10
      rs_20d_soft_pctp: 0.02
      near_high_pass_drawdown: -0.15
      near_high_strong_drawdown: -0.07
      volume_ratio_5d_20d_min: 1.3
      breakout_volume_ratio_min: 1.5
      hot_ret_20d_needs_review: 0.25
    pullback:
      drawdown_min: -0.25
      drawdown_max: -0.08
      ideal_drawdown_min: -0.20
      ideal_drawdown_max: -0.10
      ma50_near_pct: 0.03
      ma50_fail_pct: -0.08
      support_near_pct: 0.04
      volume_ratio_5d_20d_max: 0.75
      sell_volume_ratio_review: 1.5
    left_side:
      low_252_near_pct: 0.20
      high_252_drawdown_max: -0.30
      extreme_drawdown_review: -0.50
      atr_ratio_10d_20d_max: 0.85
      upper_close_days_min: 3
      sharp_market_ret20_wait: -0.08

  # 시간 기준 (모든 신호 동일 — D 단위 통일, Q2 결정)
  bar_interval: "D"

  # 신호별 임계치
  signals:
    bb_squeeze:
      enabled: true
      bb_length: 20                    # BB 계산 기간
      bb_mult: 2.0                     # BB std 배수
      width_pct_threshold: 0.5         # BBW < 20일 평균 × 이 값
      lookback_avg: 20                 # BBW 평균 기간

    volume_compression:
      enabled: true
      short_days: 5                    # 단기 평균
      long_days: 20                    # 장기 평균
      ratio_threshold: 0.6             # 단기 < 장기 × 이 값 (Z2 우승 조합 D77)

    after_low_consolidation:
      enabled: true
      low_lookback_days: 252           # 52주 신저가 기준
      consolidation_min_days: 7        # 신저가 후 횡보 시작
      consolidation_max_days: 14       # 횡보 종료
      range_pct: 0.05                  # 횡보 = 종가 변동 < ±5%

    insider_buying:                    # 미국만 (Finviz)
      enabled: true
      lookback_days: 7
      min_count: 1                     # 매수 거래 최소 횟수
      eval_top_us: 250                 # Finviz 호출 비용 제한: 미국 시총 상위 N개만 사전 평가

    rrg_improving:                     # 섹터 RRG IMPROVING 진입
      enabled: true
      transition_lookback_days: 3      # 최근 3일 내 LAGGING→IMPROVING

    ronin_entry_v2:                    # 메인지표 Entry 공진 근사: WT/MFI/BB + ST DOWN
      enabled: true                    # shadow 검증: 계산/기록은 하되 운영 점수에는 미반영
      shadow_mode: true
      recent_bars: 5                   # 최근 N봉 안에 RONIN entry 근사 발생
      wt_n1: 18
      wt_n2: 28
      wt_n3: 5
      wt_ob: 52.5
      wt_os: -45.0
      mfi_len: 14
      mfi_smooth: 5
      mfi_linger: 1
      mfi_ob: 64.5
      mfi_os: 38.5
      bb_len: 40
      bb_mult: 2.08
      bb_rein: 2
      bb_reentry_bars: 6
      ttl_cluster: 2
      st_atr_len: 16
      st_factor: 3.8
      st_confirm: 1
      st_hys_atr: 0.14

    ronin_structure_support:           # 구조존 근사: 피벗 지지/돌파 저항 근처
      enabled: true                    # shadow 검증: 계산/기록은 하되 운영 점수에는 미반영
      shadow_mode: true
      pivot_len: 12
      volume_ma: 6
      atr_len: 14
      margin_atr: 0.5
      max_zones: 6

  # 후보 채택 임계치
  max_candidates_output: 5             # 안전 기본값. 실제 브리핑 출력은 brief_pick_size/top3_selection이 결정
  brief_pick_size: 3                   # Top3 선발 최종 출력 종목 수
  min_candidates_for_alert: 1          # 0개여도 알림 발송 (다른 섹션 가능)

  # SCOUT v2 레이더 모드
  # 내부에는 넓게 저장하고, 로이에게는 엄선 후보만 보고한다.
  radar_pool_size: 100                 # 내부 관찰풀 최대 저장 수
  radar_min_score: 1.0                 # 관찰풀 편입 최소 점수
  ohlcv_top_per_country: 500           # 무신호 종목 중 국가별 OHLCV 평가 상한
  theme_boost_enabled: true            # themes.yaml 가치사슬 종목 보너스

  # SCOUT v3 Top3 선발 — 탈락 감사관이 아니라 브리핑 슬롯 선발 규칙
  top3_selection:
    enabled: true
    max_picks: 3
    watchlist_size: 5
    risk_catalyst_review_pool: true    # RISK_CATALYST는 Top3 제외, 리뷰풀로만 기록
    production_gate:
      enabled: true                    # 실전 추천은 확실 후보만 허용. 0개가 정상 결과일 수 있음
      allowed_tiers: ["A"]             # B/C/D는 추천하지 않고 WATCHLIST로만 기록
      quality_statuses: ["QUALITY_SUPPORT", "STRONG_QUALITY"]
      excluded_quality_flags: ["overextended_20d", "low_liquidity_buffer"]
      excluded_factor_negatives: ["liquidity_weak", "volatility_extreme", "chasing_extreme", "chasing_hot"]
      backfill: false
    llm_review:
      enabled: true                    # 규칙 기반 Top3를 LLM이 최종 재심사. 실패 시 규칙 기반 결과 유지
      additions_allowed: false         # LLM은 규칙 후보를 줄이거나 재정렬만 가능. WATCHLIST 승격 금지
      candidate_limit: 12              # additions_allowed=false이면 규칙 통과 후보만 투입
      max_tokens: 1200
    precision_shadow:
      enabled: true                    # Step3 가설의 미래 검증 전용. Telegram/Sheets/final Top3에는 영향 없음
      policy_id: "us_precision_v1"
      max_picks: 3                     # 0~3개 허용, 기준 미달 시 빈자리를 채우지 않음
      allowed_countries: ["US"]
      allowed_tiers: ["A"]
      theme_statuses: ["SUPPORT", "STRONG_SUPPORT"]
      quality_statuses: ["QUALITY_SUPPORT", "STRONG_QUALITY"]
      excluded_factor_negatives: ["volatility_extreme", "chasing_extreme", "chasing_hot"]
    tier_order: ["A", "B", "C", "D"]
    hierarchy:
      - "lane_strength"
      - "catalyst_freshness"
      - "support_auditor_count"
      - "opportunity_score"
      - "lane_balance"

  # SCOUT v3 추천 스냅샷 — 사후 성과표의 원장
  recommendation_snapshot:
    enabled: true
    include_radar_top: 20              # 최종 후보 외 비교용 레이더 상위 N개 저장
    parquet_enabled: true              # pyarrow 없으면 JSON만 저장하고 경고

  # SCOUT v3 테마/산업 감사관 — 탈락 권한 없음, 신뢰도 보조와 표시 전용
  theme_industry_auditor:
    enabled: true
    support_quadrants: ["LEADING", "IMPROVING"]
    caution_quadrants: ["WEAKENING"]
    fail_quadrants: ["LAGGING"]
    min_group_support_etfs: 2
    peer_confirm_top_n: 30

  # SCOUT v3 품질 감사관 — 탈락 권한 없음, 신뢰도 보조와 표시 전용
  quality_auditor:
    enabled: true
    eval_limit: 30                     # FMP/Finviz 호출 비용 방지: 레이더 상위 N개만
    growth_support_pct: 15.0
    growth_caution_pct: 0.0
    pe_support_max: 40.0
    pe_caution_min: 80.0
    peg_support_max: 2.0
    peg_caution_min: 3.0
    short_float_caution_pct: 10.0
    short_float_risk_pct: 20.0

  brief_quality_gate:
    enabled: false                     # 안전모드: 새 레이어 검증 전 최종 후보 차단/통과에 사용 금지
    allow_catalyst_found: true
    allow_ronin_entry_v2: true
    allow_signal_count_at_least: 4

  catalyst:
    enabled: true
    eval_limit: 20                     # 레이더 상위 N개만 촉매 확인
    lookback_days: 14
    max_news_per_ticker: 3
    fresh_days: 3
    stale_days: 14
    reaction_ret_3d_pct: 0.03          # 촉매 후 가격 반응 확인 기준
    reaction_drop_3d_pct: -0.05
    reaction_volume_ratio: 1.2
    llm_classification:
      enabled: true
      eval_limit: 8                    # 비용 제어: 뉴스 있는 상위 N개만 LLM JSON 분류
    score_boost: 0.0                   # 안전모드: 뉴스 촉매는 표시만 하고 점수에는 미반영
    risk_penalty: 0.0                  # 안전모드: 키워드 오탐 검증 전 감점 금지

  factor_layer:
    enabled: true                      # 저비용 가격/거래량 因子: 후보 품질 보정
    score_cap: 0.6
    liquidity_good_multiple: 10        # 일평균 거래대금이 최소 기준의 N배 이상이면 가산
    liquidity_weak_multiple: 3         # 이보다 낮으면 감점
    max_ret_20d: 0.20                  # 20일 급등 추격 감점 기준
    severe_ret_20d: 0.35               # 20일 과열 강한 감점 기준
    min_drawdown_from_high: -0.03      # 52주 고점 3% 이내면 추격 위험
    atr_pct_low: 0.015                 # 너무 죽은 변동성
    atr_pct_high: 0.09                 # 너무 거친 변동성
    min_close_days: 120
    weights:
      liquidity_good: 0.20
      liquidity_weak: -0.25
      not_chasing: 0.20
      chasing_hot: -0.25
      chasing_extreme: -0.40
      volatility_healthy: 0.20
      volatility_extreme: -0.25
      data_short: -0.30

  scoring_weights:
    bb_squeeze: 1.2
    volume_compression: 1.0
    after_low_consolidation: 1.1
    insider_buying: 0.7
    rrg_improving: 1.0
    ronin_entry_v2: 1.6
    ronin_structure_support: 0.8
    factor_quality: 0.0                # 안전모드: 因子는 표시만 하고 점수에는 미반영
    theme_A_plus: 0.8
    theme_A: 0.6
    theme_B_plus: 0.4
    theme_B: 0.2
    liquidity_boost: 0.2

  coverage_warning_threshold:
    US: 1500
    KR: 200
    JP: 400
    CN_ADR: 35
    CN_HK: 40
    CN_A: 60

  # cooldown — 같은 종목 중복 알림 방지 (시뮬 시나리오 3 발견)
  cooldown_days: 5                     # 한번 후보로 나오면 5일간 재출현 금지

# ── GUARD 포지션 모니터 ──
guard:
  daily_change_threshold_pct: 2.0      # ±2% 이상 변동 시 뉴스 매칭
  news_lookback_hours: 24
  max_news_per_ticker: 3

# ── REGIME 매크로 ──
regime:
  vix:
    low_threshold: 15
    normal_max: 25
    high_max: 30
    extreme_threshold: 40              # 이상 시 좌측거래 우호도 표시 강화

  fx:
    history_days: 90                   # 90일 분포 percentile 계산
    percentile_high_pct: 70            # 상위 30% = "비쌈"
    percentile_low_pct: 30             # 하위 30% = "쌈"

  macro_calendar:
    lookahead_days: 7
    fred_series:                       # 발표 후 결과 자동 수집
      - "FEDFUNDS"                     # 연준 기준금리
      - "DGS10"                        # 10년물 국채
      - "DEXKOUS"                      # 원/달러
      - "CPIAUCSL"                     # CPI
      - "PCE"                          # PCE
      - "UNRATE"                       # 실업률

  learning_notes:
    enabled: true                      # 매번 용어 1~2개 풀이 (Q3-1)
    max_per_brief: 2

# ── DIGEST 출력 ──
digest:
  telegram:
    max_chars: 3800                    # 텔레그램 4096 한도, 여유 296자
    fallback_message: "⚠️ 시스템 점검 필요 — 모든 데이터 모듈 실패"

  sheets:
    enabled: true                      # 저널 BRIEFING 시트에 상세 저장
    include_rejected_candidates: true  # SCOUT 탈락 후보도 기록 (학습용)

# ── 데이터 캐시 ──
cache:
  ticker_master_ttl_days: 7            # 종목 마스터 (시총/섹터)
  ohlcv_intraday_ttl_minutes: 60       # 장중 OHLCV
  finviz_screener_ttl_minutes: 30      # Finviz 스크리너 결과

# ── 4개국 유니버스 ──
universe:
  enabled_countries:
    - "US"     # NYSE + NASDAQ
    - "KR"     # KOSPI + KOSDAQ
    - "JP"     # TSE
    - "CN"     # 중국 ADR + 홍콩 + A주 주요주

  # 최대 스캔 종목 수 (Stage 1 거시 필터 통과 후)
  max_per_country:
    US: 2000
    KR: 600
    JP: 500
    CN: 500      # ADR + HK + A주
