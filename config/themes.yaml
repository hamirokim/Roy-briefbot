        priority: "B"
      - ticker: "BLDP"
        role: "Ballard Power (수소)"
        priority: "B"
    
    downstream:             # 전기차
      - ticker: "TSLA"
        role: "전기차 + 에너지 저장"
        priority: "A"
      - ticker: "LCID"
        role: "Lucid Motors"
