  # ── 3. 우주 경제 (SpaceX 영향권) ──
  space_economy:
    label_ko: "우주 경제 (SpaceX + 위성)"
    label_zh: "太空经济"
    parent_sector: "XLI"
    parent_theme_etf: "ITA"
    description: "SpaceX 비상장. 영향권 종목 = 발사체/위성/방산. 정부 예산 + 민간 수요"
    
    upstream:               # 방산 (전통)
      - ticker: "LMT"
        role: "Lockheed Martin (방산 최대)"
        priority: "A"
      - ticker: "RTX"
        role: "Raytheon (미사일/방산)"
        priority: "A"
      - ticker: "NOC"
        role: "Northrop Grumman (B-21 + 우주)"
        priority: "A"
    
    midstream:              # 발사체 (신생)
      - ticker: "RKLB"
        role: "Rocket Lab (소형 위성 발사)"
        priority: "A+"      # 성장 단계, 提前布局 후보
    
    downstream:             # 위성 운영
      - ticker: "VSAT"
        role: "Viasat (위성 통신)"
        priority: "B"
      - ticker: "IRDM"
