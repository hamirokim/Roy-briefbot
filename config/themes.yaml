        priority: "A+"
      - ticker: "MA"
        role: "글로벌 결제 네트워크"
        priority: "A+"

    midstream:
      - ticker: "PYPL"
        role: "온라인 결제"
        priority: "B+"
      - ticker: "SQ"
        role: "판매자 결제 + Cash App"
        priority: "B+"
      - ticker: "FI"
        role: "결제 처리 인프라"
        priority: "B"

    downstream:
      - ticker: "COIN"
        role: "크립토 거래 인프라"
        priority: "B+"
      - ticker: "HOOD"
