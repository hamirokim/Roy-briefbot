    upstream:
      - ticker: "MSFT"
        role: "클라우드 인프라 + AI 플랫폼"
        priority: "A+"
      - ticker: "AMZN"
        role: "AWS 클라우드 인프라"
        priority: "A"
      - ticker: "GOOGL"
        role: "Google Cloud + AI 모델"
        priority: "A"

    midstream:
      - ticker: "SNOW"
        role: "데이터 클라우드"
        priority: "B+"
      - ticker: "MDB"
        role: "개발자 데이터베이스"
        priority: "B+"
      - ticker: "DDOG"
        role: "클라우드 모니터링"
        priority: "B+"

    downstream:
