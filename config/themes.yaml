        priority: "B"

# ═══════════════════════════════════════════════════════════
# 등급 시스템 (priority)
# ═══════════════════════════════════════════════════════════
# A+ : 가치사슬 핵심 + 독점적 위치 + 高확신도
# A  : 가치사슬 주요 종목, 잘 알려진 수혜주
# B+ : 멀티-테마 노출 (다른 영역도 매출), 부분 수혜주
# B  : 신생/성장 단계, 변동성 큼
# C  : 수혜주 후보, 낮은 확신도, 모니터링만
#
# Track D 提前布局 알림 우선순위:
# A+ > A > B+ > B (C는 알림 X, 모니터링만)
# ═══════════════════════════════════════════════════════════
