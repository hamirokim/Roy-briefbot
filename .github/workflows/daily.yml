name: Daily Brief

on:
  schedule:
    - cron: "10 22 * * *"  # UTC 22:10 = KST 07:10
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 받기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRIEF_LANG: "ko"

          # ---------------- NEWS (S1) ----------------
          RSS_URLS: "https://www.hankyung.com/feed/finance,https://www.hankyung.com/feed/economy,https://www.yonhapnewseconomytv.com/rss/allArticle.xml,https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=ko&gl=KR&ceid=KR:ko"
          NEWS_FILTER: "1"
          NEWS_DIGEST_TOP: "3"
          SHOW_RAW_HEADLINES: "0"
          NEWS_REQUIRE_KOREAN: "1"

          # ---------------- UNIVERSE (S3) ----------------
          S3_HOLDINGS_PER_ETF: "50"
          S3_MAX_UNIVERSE: "200"

          # ---------------- DAILY PREFILTER (cheap) ----------------
          DD_SOFT: "-0.12"     # 바닥 후보 최소 급락(완화)
          DD_HARD: "-0.20"     # 진입 임박 최소 급락(완화)
          REQUIRE_1W_POS: "1"  # 반등기미(1W +)
          REQUIRE_1M_NEG: "1"  # 눌림 유지(1M -)

          MIN_PRICE: "5"
          MIN_DOLLAR_VOL: "10000000"  # $10M/day (완화)

          # ---------------- 4H MAIN-INDICATOR (WT/MFI/BB only) ----------------
          WT_N1: "24"
          WT_N2: "41"
          WT_N3: "5"
          WT_OB: "50.5"
          WT_OS: "-41.0"

          MFI_LEN: "11"
          MFI_SMOOTH: "6"
          MFI_LINGER: "1"
          MFI_OB: "68.0"
          MFI_OS: "32.0"

          BB_LEN: "20"
          BB_MULT: "2.2070048992556504"
          BB_REIN: "2"
          BB_REENTRY_BARS: "6"

          TTL_CLUSTER: "3"   # 3bar 내 WT/MFI/BB buy 트리거 개수(정보 표시용)

          # 후보 출력
          S3_TOP_N: "4"          # 진입 임박 0~4
          S3_BASE_TOP_N: "4"     # 바닥 후보 0~4

          # 후보 조건(메인지표 기반)
          A_MIN_ARM: "2"         # 진입 임박: arm >= 2
          B_MIN_ARM: "1"         # 바닥 후보: arm >= 1

          # 반복 추천 방지
          S3_COOLDOWN_DAYS: "7"

          # 상태/디버그
          STATE_DEDUPE_NEWS: "1"
          STATE_MAX_LINKS: "1500"
          DEBUG_S3: "1"

          # yfinance
          YF_PERIOD: "120d"      # 1h 데이터 기간 (완화)
          YF_INTERVAL: "1h"
          YF_SLEEP_SEC: "0.2"    # 호출 간 슬립(레이트리밋 완화)

        run: |
          python src/main.py

      - name: 상태(state.json) 자동 커밋
        run: |
          if [ -f data/state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/state.json
            git commit -m "chore: update state" || echo "No changes to commit"
            git push || echo "Push skipped/failed"
          else
            echo "data/state.json not found; skip commit"
          fi
