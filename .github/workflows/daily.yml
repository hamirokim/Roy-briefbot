name: Daily Briefing

on:
  schedule:
    # UTC Sun-Fri 22:10 = KST Mon-Sat 07:10
    # 미국 시장 close → 다음 한국 발송일 매핑 (좌측거래 시스템 운용 패턴)
    #   UTC 일 22:10 → KST 월 07:10  (미국 금요일 close 데이터 + 주말 뉴스, 주간 모드)
    #   UTC 월 22:10 → KST 화 07:10  (미국 월요일 close)
    #   UTC 화 22:10 → KST 수 07:10  (미국 화요일 close)
    #   UTC 수 22:10 → KST 목 07:10  (미국 수요일 close)
    #   UTC 목 22:10 → KST 금 07:10  (미국 목요일 close)
    #   UTC 금 22:10 → KST 토 07:10  (미국 금요일 close ← 신선 데이터)
    # KST 일요일만 발송 안 함 (UTC 토 발사 X)
    # 월요일 weekly와 토요일 daily는 같은 가격 데이터지만 — 토=신속 daily, 월=주말 흡수+종합
    # 모드 자동 감지 (main.py _detect_briefing_mode):
    #   - 매월 첫 발송   → monthly (전월 정리 + 새 달 방향, weekly 흡수)
    #   - 월요일 첫 weekly → weekly (전주 종합 + 새 주 방향)
    #   - 그 외          → daily
    - cron: '10 22 * * 0-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Briefing mode (auto = 날짜 기반 자동 감지)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - daily
          - weekly
          - monthly

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run briefbot v2.0
        env:
          # OpenAI (LLM)
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          GPT_MODEL: ${{ secrets.GPT_MODEL || 'gpt-5.4-mini' }}

          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Finnhub (GUARD 종목별 뉴스)
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

          # FRED (REGIME 매크로 — 선택)
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

          # Google Sheets (저널 + 보유 포지션)
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          python main.py "$MODE"

      - name: Commit state.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json data/cache/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: state update $(date -u +%Y-%m-%d)"
          git push 2>/dev/null || echo "no changes to push"
