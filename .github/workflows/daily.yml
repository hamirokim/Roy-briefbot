name: Daily Brief

on:
  schedule:
    - cron: "10 22 * * *"  # UTC 22:10 = KST 07:10 (US close 데이터 반영 여유)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 받기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # ---- 뉴스(S1) ----
          NEWS_FILTER: "1"
          NEWS_DIGEST_TOP: "3"
          SHOW_RAW_HEADLINES: "0"

          # ---- 후보(S3): 희소/고확률 ----
          S3_TOP_N: "2"
          S3_HOLDINGS_PER_ETF: "25"
          S3_MAX_UNIVERSE: "70"
          S3_MIN_PRICE: "5"
          S3_MIN_DOLLAR_VOL: "20000000"
          S3_MIN_DD: "-0.25"
          S3_REQUIRE_1M_NEG: "1"
          S3_MAX_BOUNCE_FROM_20D_LOW: "0.08"
          S3_REQUIRE_ABOVE_200SMA: "1"
          S3_REQUIRE_SLOPE200_POS: "1"
          S3_MIN_ATR_PCT: "2.0"
          S3_MAX_ATR_PCT: "8.0"

        run: |
          python src/main.py
