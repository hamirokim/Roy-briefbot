name: Roy-브리프봇 Daily

on:
  schedule:
    - cron: "10 22 * * 0-4"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RS_RATIO_PERIOD: "63"
      RS_MOM_PERIOD: "10"
      RS_HISTORY_KEEP_DAYS: "7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefbot
        run: python main.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "briefbot"
          git config user.email "briefbot@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
