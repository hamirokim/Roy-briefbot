name: Daily Brief

on:
  schedule:
    - cron: "10 22 * * *"  # UTC 22:10 = KST 07:10
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 받기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # ---- 브리핑 기본 ----
          BRIEF_LANG: "ko"

          # ---- 뉴스(S1) ----
          # KR 소스 위주(영문 RSS는 기본 제외)
          RSS_URLS: "https://www.hankyung.com/feed/finance,https://www.hankyung.com/feed/economy,https://www.yonhapnewseconomytv.com/rss/allArticle.xml,https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=ko&gl=KR&ceid=KR:ko"
          NEWS_FILTER: "1"
          NEWS_DIGEST_TOP: "3"
          SHOW_RAW_HEADLINES: "0"
          NEWS_REQUIRE_KOREAN: "1"    # 1=한글 제목만(권장), 0=영문도 허용

          # ---- 후보(S3): 희소/고확률 ----
          S3_TOP_N: "4"
          S3_HOLDINGS_PER_ETF: "30"
          S3_MAX_UNIVERSE: "120"

          S3_MIN_PRICE: "5"
          S3_MIN_DOLLAR_VOL: "20000000"

          S3_MIN_DD: "-0.30"
          S3_PRE_DD: "-0.27"
          S3_REQUIRE_1M_NEG: "1"
          S3_MAX_BOUNCE_FROM_20D_LOW: "0.10"

          S3_REQUIRE_ABOVE_200SMA: "1"
          S3_REQUIRE_SLOPE200_POS: "1"

          S3_MIN_ATR_PCT: "2.0"
          S3_MAX_ATR_PCT: "8.0"

          S3_COOLDOWN_DAYS: "10"

          # ---- 상태/디버그 ----
          STATE_DEDUPE_NEWS: "1"
          STATE_MAX_LINKS: "1500"
          DEBUG_S3: "1"              # 1=스캔 통계 S4 로그에 출력

        run: |
          python src/main.py

      - name: 상태(state.json) 자동 커밋
        run: |
          if [ -f data/state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/state.json
            git commit -m "chore: update state" || echo "No changes to commit"
            git push || echo "Push skipped/failed"
          else
            echo "data/state.json not found; skip commit"
          fi
